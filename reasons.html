<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>100 Reasons Why I ❤️ You</title>
            <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #fff5f7;
            --accent-color: #ff6b81;
            --text-color: #4a4a4a;
            --box-shadow: 0 10px 20px rgba(255, 107, 129, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
            background: white;
            margin-bottom: 30px;
            box-shadow: var(--box-shadow);
        }

        .header h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: #ff4757;
        }

        /* The Grid System */
        #reasons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* The Reason Box */
        .reason-box {
            background: white;
            border: 1px solid rgba(255, 107, 129, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: var(--box-shadow);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            
            /* Initial state for lazy loading animation */
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;

            /* Floating Animation Settings */
            animation: float var(--float-duration) ease-in-out infinite alternate;
            animation-delay: var(--float-delay);
        }

        .reason-box.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .reason-box .number {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--accent-color);
            opacity: 0.5;
        }

        .reason-box .heart-icon {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .reason-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Floating Animation Keyframes */
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* Loading Trigger (Sentinel) */
        #loading-sentinel {
            height: 50px;
            width: 100%;
            margin-bottom: 50px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            #reasons-container {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 15px;
            }
            .reason-box {
                min-height: 140px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>100 Reasons Why ❤️</h1>
        <p>Because one reason just isn't enough...</p>
        <a href="./index.html" class="back-btn">← Back</a>
    </div>

    <div id="reasons-container">
        <!-- Reasons will be injected here by JavaScript -->
    </div>

    <!-- This element triggers the loading of the next batch when it scrolls into view -->
    <div id="loading-sentinel"></div>

    <script>
        // 1. YOUR 100 REASONS ARRAY
        // Replace the text inside these strings with your own reasons.
        const allReasons = [
            "Your smile makes my day.", "You are my safe place.",
            "The way you look at me.", "You tolerate my bad jokes.",
            "Your kindness to everyone.", "How cute you look when angry.",
            "You are my best friend.", "Your voice heals me.",
            "We are perfect together.", "You make me a better person.",
            "The way you say my name.", "Your laugh is my favorite sound.",
            "You always believe in me.", "You give the best hugs even though you are the only person i have hug.",
            "How much you care about us.", "You are the most beautiful girl, my girl.",
            "Your silly side, nautanki, nakharey ....", "The way you play with my hair.",
            "You understand me without words.", "You are my happy place.",
            "I love your, no reason needed.", "You are my princess.",
            "How you handle my irritation.", "You are my cutie pie.",
            "Your come in my dream.", "I want to eat you.",
            "You inspire me.", "Your morning texts.",
            "How you listen to my words.", "You are my lucky charm.",
            "The way you hold my hand.", "You are incredibly smart.",
            "Your passion for things you love.", "You make boring days fun.",
            "I love making memories with you.", "You are my dream come true.",
            "How you cheer me up.", "Your confidence.",
            "You have the purest heart.", "I love your drama (sometimes Annoying😂).",
            "You are worth every effort.", "How we can talk for hours.",
            "The way you support my dreams.", "You are my sunshine.",
            "I love annoying you.", "Your patience with me.",
            "How you take care of me.", "You are simply adorable.",
            "I love your scent.", "You make me feel loved.",
            "You are my forever.", "Your ocean like eyes (it deserves to be mentioned twice!).",
            "Love how i prank you.", "You are my home.",
            "I love your honesty.", "You make my heart race.",
            "I want to grow old with you.", "You are my motivation.",
            "Your cute texting habits.", "You are my Gudiya.",
            "How strong you are.", "I love your chicks, want to kiss them.",
            "You complete me.", "Every moment with you is magic.",
            "I want to fight with you (WWE💪).", "You are my everything.",
            "How you scold me.", "Your innocence.",
            "You make the world beautiful.", "I love watching you sleep.",
            "You are the reason I smile.", "Your unconditional love.",
            "I love how little you are.", "You are my greatest gift.",
            "How you make me feel strong.", "want to cuddle.",
            "I love your cooking (trying to do 😂).", "You are my soulmate.",
            "How you blush.", "I love stealing glances at you.",
            "You make problems disappear.", "I love eye contact compition with you (i loss every time🥺).",
            "I love our inside jokes.", "Because i am god 😂.",
            "How you irritat me.", "I love your energy.",
            "You are my pride.", "I love showing you off.",
            "You make me want to be better.", "Your loyalty.",
            "Because you are chudail.", "You are my peace.",
            "How you eat food (chocolate😋).", "I love your imperfections.",
            "You are my greatest adventure.", "I love your touch.",
            "You are the best thing in my life.", "I love you more than words.",
            "Because you are mine, my girl.", "I choose you, every single day."
        ];

        const container = document.getElementById('reasons-container');
        const sentinel = document.getElementById('loading-sentinel');
        let currentIndex = 0;
        const batchSize = 10; // Loads 12 boxes at a time for smoothness

        // Function to create a single reason box
        function createReasonBox(text, index) {
            const box = document.createElement('div');
            box.className = 'reason-box';
            
            // Randomize floating animation
            const duration = (2 + Math.random() * 2).toFixed(2) + 's';
            const delay = (Math.random() * -5).toFixed(2) + 's';
            box.style.setProperty('--float-duration', duration);
            box.style.setProperty('--float-delay', delay);

            box.innerHTML = `
                <div class="number">#${index + 1}</div>
                <div class="heart-icon">❤️</div>
                <div class="reason-text">${text}</div>
            `;
            
            return box;
        }

        // Function to load the next batch of reasons
        function loadBatch() {
            const end = Math.min(currentIndex + batchSize, allReasons.length);
            
            for (let i = currentIndex; i < end; i++) {
                const box = createReasonBox(allReasons[i], i);
                container.appendChild(box);
                
                // Trigger the entry animation with a tiny delay per box for a "staggered" look
                setTimeout(() => {
                    box.classList.add('visible');
                }, (i - currentIndex) * 100);
            }
            
            currentIndex = end;

            // If we've loaded everything, remove the sentinel
            if (currentIndex >= allReasons.length) {
                sentinel.remove();
            }
        }

        // Intersection Observer for Lazy Loading
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadBatch();
            }
        }, {
            rootMargin: '100px',
            threshold: 0.1
        });

        // Initialize
        if (allReasons.length > 0) {
            observer.observe(sentinel);
        } else {
            container.innerHTML = "<p>No reasons found. Please add them to the array!</p>";
        }

    </script>
</body>
</html>
